<!DOCTYPE html>
<html lang="ja">
<head>
<head>

content="width=device-width, initial-scale=1.0">

</head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ひめたま謎解き散歩</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
<!-- QRスキャン演出 -->

<div id="scan-effect">

    <div class="scan-line"></div>

    <div class="scan-text">
        ACCESS...
    </div>

</div>
<!-- ロード画面 -->

<div id="loading-screen">

    <div class="loader-text">

        NOW LOADING...

    </div>

</div>
<div class="particles">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

    <!-- オープニング -->
    <section class="page active" id="opening1">
        <img src="images/opening1.png" class="story-image">

        <button onclick="nextPage('opening2')">
            次へ
        </button>
    </section>

    <!-- プロローグ -->
    <section class="page" id="opening2">
        <img src="images/opening2.png" class="story-image">

        <button onclick="nextPage('q1')">
            謎解きを始める
        </button>
    </section>

<!-- 第1問ストーリー -->
<section class="page story-page" id="story1">
    <img src="images/story1.png" class="story-image">

    <button onclick="nextPage('q1')" class="next-btn">
        第1問へ
    </button>
</section>
    <!-- 問題1 -->
    <section class="page" id="q1">
        <img src="images/q1.png" class="story-image">

        <input type="text" id="answer1" placeholder="答えを入力">

        <button onclick="checkAnswer(
            'answer1',
            '足利学校',
            '"story2"'
        )">
            解答
        </button>
    </section>
<!-- 第2問ストーリー -->
<section class="page story-page" id="story2">
    <img src="images/story2.png" class="story-image">

    <button onclick="nextPage('q2')" class="next-btn">
        第2問へ
    </button>
</section>

    <!-- 問題2 -->
    <section class="page" id="q2">
        <img src="images/q2.png" class="story-image">

        <input type="text" id="answer2" placeholder="答えを入力">

        <button onclick="checkAnswer(
            'answer2',
            '2',
            'story3'
        )">
            解答
        </button>
    </section>

<section class="page story-page" id="story3">
    <img src="images/story3.png" class="story-image">

    <button onclick="nextPage('q3')" class="next-btn">
        第3問へ
    </button>
</section>
    <!-- 問題3 -->
    <section class="page" id="q3">
        <img src="images/q3.png" class="story-image">

        <input type="text" id="answer3" placeholder="答えを入力">

        <button onclick="checkAnswer(
            'answer3',
            'JSDF',
            'story4'
        )">
            解答
        </button>
    </section>

<section class="page story-page" id="story4">
    <img src="images/story4.png" class="story-image">

    <button onclick="nextPage('q4')" class="next-btn">
        第4問へ
    </button>
</section>
    <!-- 問題4 -->
    <section class="page" id="q4">
        <img src="images/q4.png" class="story-image">

        <input type="text" id="answer4" placeholder="答えを入力">

        <button onclick="checkAnswer(
            'answer4',
            'おいのりします',
            'story5'
        )">
            解答
        </button>
    </section>

<section class="page story-page" id="story5">
    <img src="images/story5.png" class="story-image">

    <button onclick="nextPage('q5')" class="next-btn">
        第5問へ
    </button>
</section>
    <!-- 問題5 -->
    <section class="page" id="q5">
        <img src="images/q5.png" class="story-image">

        <input type="text" id="answer5" placeholder="答えを入力">

        <button onclick="checkAnswer(
            'answer5',
            'しらん',
            'epilogue'
        )">
            解答
        </button>
    </section>

    <!-- エピローグ -->
    <section class="page" id="epilogue">
        <img src="images/epilogue.png" class="story-image">
    </section>

    <script src="script.js"></script>

</body>
</html>
<section id="q1">
<section id="q2">
<section id="q3">
<section id="q4">
