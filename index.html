<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ひめたま謎解き散歩</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
<div class="particles">
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
</div>

    <!-- オープニング -->
    <section class="page active" id="opening1">
        <img src="images/opening1.png" class="story-image">

        <button onclick="nextPage('opening2')">
            次へ
        </button>
    </section>

    <!-- プロローグ -->
    <section class="page" id="opening2">
        <img src="images/opening2.png" class="story-image">

        <button onclick="nextPage('q1')">
            謎解きを始める
        </button>
    </section>

    <!-- 問題1 -->
    <section class="page" id="q1">
        <img src="images/q1.png" class="story-image">

        <input type="text" id="answer1" placeholder="答えを入力">

        <button onclick="checkAnswer(
            'answer1',
            '足利学校',
            'q2'
        )">
            解答
        </button>
    </section>

    <!-- 問題2 -->
    <section class="page" id="q2">
        <img src="images/q2.png" class="story-image">

        <input type="text" id="answer2" placeholder="答えを入力">

        <button onclick="checkAnswer(
            'answer2',
            '2',
            'q3'
        )">
            解答
        </button>
    </section>

    <!-- 問題3 -->
    <section class="page" id="q3">
        <img src="images/q3.png" class="story-image">

        <input type="text" id="answer3" placeholder="答えを入力">

        <button onclick="checkAnswer(
            'answer3',
            'JSDF',
            'q4'
        )">
            解答
        </button>
    </section>

    <!-- 問題4 -->
    <section class="page" id="q4">
        <img src="images/q4.png" class="story-image">

        <input type="text" id="answer4" placeholder="答えを入力">

        <button onclick="checkAnswer(
            'answer4',
            'おいのりします',
            'q5'
        )">
            解答
        </button>
    </section>

    <!-- 問題5 -->
    <section class="page" id="q5">
        <img src="images/q5.png" class="story-image">

        <input type="text" id="answer5" placeholder="答えを入力">

        <button onclick="checkAnswer(
            'answer5',
            'しらん',
            'epilogue'
        )">
            解答
        </button>
    </section>

    <!-- エピローグ -->
    <section class="page" id="epilogue">
        <img src="images/epilogue.png" class="story-image">
    </section>

    <script src="script.js"></script>

</body>
</html>
